<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumenAI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased p-6">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">LumenAI Dashboard</h1>
                <p class="text-gray-400">Monitorización SRE AI-Native</p>
            </div>
            <div id="connection-status" class="px-3 py-1 rounded-full text-sm font-semibold bg-green-500/20 text-green-400 border border-green-500">Conectado</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h2 class="text-gray-400 text-sm uppercase font-semibold mb-2">CPU Actual</h2>
                <div class="text-4xl font-bold" id="cpu-value">--%</div>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h2 class="text-gray-400 text-sm uppercase font-semibold mb-2">Memoria Actual</h2>
                <div class="text-4xl font-bold" id="mem-value">--%</div>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h2 class="text-gray-400 text-sm uppercase font-semibold mb-2">Disco Actual</h2>
                <div class="text-4xl font-bold" id="disk-value">--%</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Gráfica -->
            <div class="lg:col-span-2 bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h2 class="text-xl font-bold mb-4 text-gray-200">Uso de Recursos en el Tiempo</h2>
                <div class="relative h-72">
                    <canvas id="metricsChart"></canvas>
                </div>
            </div>
            
            <!-- Alertas SRE -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg flex flex-col">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-gray-200">
                    <span class="text-red-400">⚠️</span> Diagnósticos de IA
                </h2>
                <div id="alerts-container" class="space-y-4 overflow-y-auto flex-1 max-h-72 pr-2">
                    <p class="text-gray-400 italic text-sm">Cargando historial de alertas...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Chart.js
        const ctx = document.getElementById('metricsChart').getContext('2d');
        Chart.defaults.color = '#9CA3AF';
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'CPU (%)',
                        borderColor: '#60A5FA',
                        backgroundColor: 'rgba(96, 165, 250, 0.1)',
                        data: [],
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: 'Memoria (%)',
                        borderColor: '#34D399',
                        backgroundColor: 'rgba(52, 211, 153, 0.1)',
                        data: [],
                        fill: true,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { min: 0, max: 100, grid: { color: '#374151' } },
                    x: { grid: { display: false } }
                },
                plugins: {
                    legend: { labels: { color: '#D1D5DB' } }
                }
            }
        });

        // Función principal para obtener datos del servidor
        async function fetchDashboardData() {
            try {
                const [statusRes, historyRes, alertsRes] = await Promise.all([
                    fetch('/status'),
                    fetch('/history'),
                    fetch('/alerts')
                ]);

                if (!statusRes.ok) throw new Error('Network error');

                // Actualizar estado de conexión
                const connBadge = document.getElementById('connection-status');
                connBadge.className = "px-3 py-1 rounded-full text-sm font-semibold bg-green-500/20 text-green-400 border border-green-500";
                connBadge.innerText = "Online";

                // Actualizar tarjetas de métricas actuales
                const status = await statusRes.json();
                if (status.latest_metrics) {
                    const metrics = status.latest_metrics;
                    document.getElementById('cpu-value').innerText = `${metrics.cpu_percent.toFixed(1)}%`;
                    document.getElementById('mem-value').innerText = `${metrics.memory.percent.toFixed(1)}%`;
                    document.getElementById('disk-value').innerText = `${metrics.disk.percent.toFixed(1)}%`;
                    
                    // Colorear CPU si es crítica
                    if(metrics.cpu_percent > 85) {
                        document.getElementById('cpu-value').classList.add('text-red-400');
                    } else {
                        document.getElementById('cpu-value').classList.remove('text-red-400');
                    }
                }

                // Actualizar la gráfica con el historial
                const historyData = await historyRes.json();
                if (historyData.history) {
                    chart.data.labels = historyData.history.map(d => new Date(d.time).toLocaleTimeString());
                    chart.data.datasets[0].data = historyData.history.map(d => d.cpu);
                    chart.data.datasets[1].data = historyData.history.map(d => d.memory);
                    chart.update();
                }

                // Actualizar la lista de Alertas SRE
                const alertsData = await alertsRes.json();
                const container = document.getElementById('alerts-container');
                if (alertsData.active_alerts && alertsData.active_alerts.length > 0) {
                    container.innerHTML = alertsData.active_alerts.map(a => `
                        <div class="p-4 bg-red-900/10 border border-red-500/30 rounded-lg">
                            <div class="text-xs text-red-400/80 mb-1">${new Date(a.timestamp).toLocaleString()}</div>
                            <h3 class="font-bold text-red-300 mb-2">${a.issue_detected}</h3>
                            <p class="text-sm text-gray-300 mb-3"><span class="font-semibold text-gray-400">Causa:</span> ${a.root_cause}</p>
                            <div class="text-sm">
                                <span class="font-semibold text-gray-400">Recomendaciones:</span>
                                <ul class="list-disc pl-4 mt-1 text-gray-400 space-y-1">
                                    ${JSON.parse(a.recommendations).map(r => `<li>${r}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-gray-400 text-sm">No hay diagnósticos recientes. El sistema está saludable.</p>';
                }

            } catch (error) {
                console.error("Error conectando con el servidor:", error);
                const connBadge = document.getElementById('connection-status');
                connBadge.className = "px-3 py-1 rounded-full text-sm font-semibold bg-red-500/20 text-red-400 border border-red-500";
                connBadge.innerText = "Offline";
            }
        }

        // Ejecutar inmediatamente y luego cada 5 segundos
        fetchDashboardData();
        setInterval(fetchDashboardData, 5000);
    </script>
</body>
</html>
